<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypter Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00ffe7;
  --pink: #ff2d78;
  --dark: #060612;
  --card: #0d0d1f;
  --glow-cyan: 0 0 20px #00ffe7aa;
  --glow-pink: 0 0 20px #ff2d78aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  font-family: 'Rajdhani', sans-serif;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
  animation: gridPulse 8s ease-in-out infinite;
}
@keyframes gridPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}
body::after {
  content: '';
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,255,231,0.07) 0%, transparent 70%);
  top: -200px;
  left: -200px;
  z-index: 0;
  animation: orbFloat 10s ease-in-out infinite alternate;
}
@keyframes orbFloat {
  from { transform: translate(0, 0); }
  to { transform: translate(80px, 80px); }
}
.orb2 {
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(255,45,120,0.07) 0%, transparent 70%);
  bottom: -150px;
  right: -150px;
  z-index: 0;
  animation: orbFloat2 12s ease-in-out infinite alternate;
}
@keyframes orbFloat2 {
  from { transform: translate(0, 0); }
  to { transform: translate(-60px, -60px); }
}
header {
  position: relative;
  z-index: 10;
  padding: 50px 20px 30px;
  text-align: center;
}
.logo-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 8px;
}
.logo-dash {
  height: 2px;
  width: 60px;
  background: linear-gradient(90deg, transparent, var(--cyan));
}
.logo-dash.right {
  background: linear-gradient(90deg, var(--cyan), transparent);
}
h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(32px, 8vw, 64px);
  font-weight: 900;
  letter-spacing: 8px;
  background: linear-gradient(135deg, var(--cyan) 0%, #fff 50%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(0,255,231,0.5)); }
  50% { filter: drop-shadow(0 0 20px rgba(0,255,231,0.9)); }
}
.subtext {
  font-size: 14px;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-top: 6px;
}
.divider {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 20px auto;
  width: 90%;
  max-width: 500px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}
.divider-diamond {
  width: 8px;
  height: 8px;
  border: 1px solid var(--cyan);
  transform: rotate(45deg);
  box-shadow: var(--glow-cyan);
}
.status-bar {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 0 auto 50px;
  flex-wrap: wrap;
  padding: 0 20px;
}
.status-item {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: rgba(0,255,231,0.6);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: var(--glow-cyan);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}
.games {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 0 20px 60px;
  max-width: 500px;
  margin: 0 auto;
}
.game-card {
  position: relative;
  background: var(--card);
  border: 1px solid rgba(0,255,231,0.15);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  animation: cardIn 0.6s ease both;
}
.game-card:nth-child(1) { animation-delay: 0.1s; }
.game-card:nth-child(2) { animation-delay: 0.2s; }
.game-card:nth-child(3) { animation-delay: 0.3s; }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.game-card:hover {
  transform: translateY(-3px);
  border-color: var(--cyan);
  box-shadow: var(--glow-cyan), inset 0 0 30px rgba(0,255,231,0.03);
}
.game-card:nth-child(2):hover {
  border-color: var(--pink);
  box-shadow: var(--glow-pink), inset 0 0 30px rgba(255,45,120,0.03);
}
.game-card::before, .game-card::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  z-index: 2;
}
.game-card::before {
  top: -1px; left: -1px;
  border-top: 2px solid var(--cyan);
  border-left: 2px solid var(--cyan);
}
.game-card::after {
  bottom: -1px; right: -1px;
  border-bottom: 2px solid var(--cyan);
  border-right: 2px solid var(--cyan);
}
.game-card:nth-child(2)::before,
.game-card:nth-child(2)::after {
  border-color: var(--pink);
}
.card-inner {
  display: flex;
  align-items: center;
  padding: 22px 24px;
  gap: 20px;
}
.card-icon {
  font-size: 36px;
  flex-shrink: 0;
  filter: drop-shadow(0 0 8px rgba(0,255,231,0.6));
}
.game-card:nth-child(2) .card-icon {
  filter: drop-shadow(0 0 8px rgba(255,45,120,0.6));
}
.card-info { flex: 1; text-align: left; }
.card-number {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: rgba(0,255,231,0.4);
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.game-card:nth-child(2) .card-number { color: rgba(255,45,120,0.4); }
.card-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(14px, 4vw, 20px);
  font-weight: 700;
  letter-spacing: 2px;
}
.card-genre {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 3px;
}
.card-arrow {
  font-size: 20px;
  color: var(--cyan);
  opacity: 0.4;
  transition: opacity 0.2s, transform 0.2s;
}
.game-card:nth-child(2) .card-arrow { color: var(--pink); }
.game-card:hover .card-arrow { opacity: 1; transform: translateX(4px); }
.scanline {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,255,231,0.01) 2px, rgba(0,255,231,0.01) 4px
  );
  pointer-events: none;
}
footer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding-bottom: 30px;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.1);
}
</style>
</head>
<body>
<div class="orb2"></div>
<header>
  <div class="logo-line">
    <div class="logo-dash"></div>
    <h1>Hypter Games</h1>
    <div class="logo-dash right"></div>
  </div>
  <div class="subtext">Offline HTML Game Launcher</div>
</header>
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-diamond"></div>
  <div class="divider-line"></div>
</div>
<div class="status-bar">
  <div class="status-item"><div class="status-dot"></div> SYSTEM ONLINE</div>
  <div class="status-item"><div class="status-dot" style="background:var(--pink);box-shadow:var(--glow-pink);animation-delay:0.5s"></div> 3 GAMES LOADED</div>
  <div class="status-item"><div class="status-dot" style="animation-delay:1s"></div> OFFLINE MODE</div>
</div>
<div class="games">
  <div class="game-card" onclick="launchGame('game.html')">
    <div class="scanline"></div>
    <div class="card-inner">
      <div class="card-info">
        <div class="card-number">// GAME_01</div>
        <div class="card-title">IGLOOCRAFT</div>
        <div class="card-genre">Survival · Craft</div>
      </div>
    </div>
  </div>
  <div class="game-card" onclick="launchGame('HexGL/index.html')">
    <div class="scanline"></div>
    <div class="card-inner">
      <div class="card-info">
        <div class="card-number">// GAME 02</div>
        <div class="card-title">HEXGL/index.html</div>
        <div class="card-genre">Racing · Speed</div>
      </div>
    </div>
  </div>
  <div class="game-card" onclick="launchGame('Basic-Snake-Game/index.html')">
    <div class="scanline"></div>
    <div class="card-inner">
      <div class="card-info">
        <div class="card-number">// GAME 03</div>
        <div class="card-title">SNAKE</div>
        <div class="card-genre">Arcade · Classic</div>
      </div>
    </div>
  </div>
  <div class="game-card" onclick="launchGame('tetris.html')">
    <div class="scanline"></div>
    <div class="card-inner">
      <div class="card-info">
        <div class="card-number">// GAME 04</div>
        <div class="card-title">Tetris</div>
        <div class="card-genre">Relaxing · Arcade Classic</div>
      </div>
    </div>
  </div>
</div>
<footer>HYPTER GAMES v3.0 · GITHUB BUILD · ALL SYSTEMS GO</footer>
<script>
function launchGame(path) {
  window.location.href = path;
}
</script>
</body>
</html>
