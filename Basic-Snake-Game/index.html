<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* PASTE YOUR CSS HERE */
    body{ font-family:Arial; background:#0f172a; color:white; margin:0; }
    h1{ text-align:center; margin-top:20px; }
    .game-layout{ position:relative; width:100%; }
    .leaderboard-panel{ position:absolute; left:40px; top:80px; width:200px; background:#020617; border:2px solid #22c55e; padding:15px; border-radius:8px; }
    #leaderboard{ list-style:none; padding:0; }
    #leaderboard li{ background:#0f172a; border:1px solid #22c55e; padding:8px; margin:6px 0; border-radius:6px; }
    .game-panel{ width:420px; margin:0 auto; text-align:center; }
    canvas{ background:#020617; border:4px solid #22c55e; display:block; margin:20px auto; touch-action: none; }
    button{ padding:10px 20px; font-size:16px; margin:5px; cursor:pointer; border:none; border-radius:6px; background:#22c55e; color:black; font-weight:bold; }
    button:hover{ background:#16a34a; }
    
    /* ADDED: Mobile D-Pad for your tablet */
    .controls { display: none; grid-template-columns: repeat(3, 60px); gap: 10px; justify-content: center; margin-top: 20px; }
    @media (max-width: 800px) { .controls { display: grid; } .leaderboard-panel { position: static; width: 90%; margin: 10px auto; } }
    .ctrl-btn { width: 60px; height: 60px; background: #22c55e; border: none; border-radius: 50%; font-size: 24px; }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <div class="game-layout">
    <div class="leaderboard-panel">
      <h3>Leaderboard</h3>
      <ol id="leaderboard"></ol>
    </div>
    <div class="game-panel">
      <h2>Score: <span id="score">0</span></h2>
      <h3>High Score: <span id="highScore">0</span></h3>
      <p>Press P to Pause</p>
      <button id="startBtn">Start Game</button>
      <button id="restartBtn" style="display:none;">Restart Game</button>
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      
      <div class="controls">
        <div></div><button class="ctrl-btn" onclick="setDir('UP')">▲</button><div></div>
        <button class="ctrl-btn" onclick="setDir('LEFT')">◀</button><div></div><button class="ctrl-btn" onclick="setDir('RIGHT')">▶</button>
        <div></div><button class="ctrl-btn" onclick="setDir('DOWN')">▼</button><div></div>
      </div>
    </div>
  </div>
  <script>
    // PASTE YOUR script.js CONTENT HERE
    // Add this function at the bottom of the script for the buttons:
    function setDir(d) { if(paused) return; direction = d; }
  </script>
</body>
</html>
