<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game - Final Build</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin: 0; overflow: hidden; }
        h1 { text-align: center; margin-top: 10px; font-size: 24px; }
        .game-layout { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .leaderboard-panel { 
            width: 200px; background: #020617; border: 2px solid #22c55e; 
            padding: 10px; border-radius: 8px; margin: 5px;
        }

        @media (min-width: 900px) {
            .leaderboard-panel { position: absolute; left: 20px; top: 60px; }
        }

        #leaderboard { list-style: none; padding: 0; margin: 0; }
        #leaderboard li { background: #0f172a; border: 1px solid #22c55e; padding: 5px; margin: 4px 0; border-radius: 6px; font-size: 13px; }
        
        .game-panel { width: 100%; max-width: 420px; text-align: center; }
        
        canvas { 
            background: #020617; border: 4px solid #22c55e; 
            display: block; margin: 10px auto; 
            max-width: 85vw; height: auto;
            touch-action: none; 
        }

        button { 
            padding: 12px 24px; font-size: 18px; margin: 5px; cursor: pointer; 
            border: none; border-radius: 8px; background: #22c55e; color: black; font-weight: bold; 
        }
        button:hover { background: #16a34a; }
        #score-area { font-size: 18px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="game-layout">

        <canvas id="gameCanvas" width="400" height="400"></canvas>

    </div>
</div>
