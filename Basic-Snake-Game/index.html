<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake Game - Universal Wall-Wrap</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin: 0; overflow: hidden; }
    h1 { text-align: center; margin-top: 20px; }
    .game-layout { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
    
    .leaderboard-panel { 
      width: 200px; background: #020617; border: 2px solid #22c55e; 
      padding: 15px; border-radius: 8px; margin: 10px;
    }

    @media (min-width: 900px) {
      .leaderboard-panel { position: absolute; left: 40px; top: 80px; }
    }

    #leaderboard { list-style: none; padding: 0; }
    #leaderboard li { background: #0f172a; border: 1px solid #22c55e; padding: 8px; margin: 6px 0; border-radius: 6px; font-size: 14px; }
    
    .game-panel { width: 100%; max-width: 420px; text-align: center; }
    
    canvas { 
      background: #020617; border: 4px solid #22c55e; 
      display: block; margin: 20px auto; 
      max-width: 90vw; height: auto;
      touch-action: none; /* Stops tablet scrolling */
    }

    button { 
      padding: 12px 24px; font-size: 18px; margin: 10px; cursor: pointer; 
      border: none; border-radius: 8px; background: #22c55e; color: black; font-weight: bold; 
    }
    button:hover { background: #16a34a; }
  </style>
</head>
<body>

<h1>Snake Game</h1>

<div class="game-layout">
  <div class="leaderboard-panel">
    <h3>Leaderboard</h3>
    <ol id="leaderboard"></ol>
  </div>

  <div class="game-panel">
    <h2>Score: <span id="score">0</span></h2>
    <h3>High Score: <span id="highScore">0</span></h3>
    <p>Swipe or Arrows to move. Walls are Portals!</p>
    
    <button id="startBtn">START GAME</button>
    <button id="restartBtn" style="display:none;">RESTART GAME</button>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

const box = 20;
let snake, direction, food, score, gameLoop, paused = false;
let playerName = "Player";
let highScore = localStorage.getItem("snakeHighScore") || 0;
document.getElementById("highScore").innerText = highScore;
let leaderboard = JSON.parse(localStorage.getItem("snakeLeaderboard")) || [];

/* --- CONTROLS --- */

// Keyboard (PC)
document.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "p") paused = !paused;
    if (paused) return;
    if (e.keyCode == 37 && direction != "RIGHT") direction = "LEFT";
    else if (e.keyCode == 38 && direction != "DOWN") direction = "UP";
    else if (e.keyCode == 39 && direction != "LEFT") direction = "RIGHT";
    else if (e.keyCode == 40 && direction != "UP") direction = "DOWN";
    if([37, 38, 39, 40].includes(e.keyCode)) e.preventDefault();
});

// Swipe (Tablet)
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    let xDiff = e.changedTouches[0].screenX - touchStartX;
    let yDiff = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(xDiff) < 15 && Math.abs(yDiff) < 15) return;

    if (Math.abs(xDiff) > Math.abs(yDiff)) {
        if (xDiff > 0 && direction !== "LEFT") direction = "RIGHT";
        else if (xDiff < 0 && direction !== "RIGHT") direction = "LEFT";
    } else {
        if (yDiff > 0 && direction !== "UP") direction = "DOWN";
        else if (yDiff < 0 && direction !== "DOWN") direction = "UP";
    }
}, {passive: false});

/* --- GAME ENGINE --- */

function initGame() {
    snake = [{x: 9 * box, y: 10 * box}];
    direction = "RIGHT";
    score = 0;
    paused = false;
    document.getElementById("score").innerText = score;
    spawnFood();
    updateLeaderboardView();
}

function spawnFood() {
    food = { 
        x: Math.floor(Math.random() * (canvas.width/box)) * box, 
        y: Math.floor(Math.random() * (canvas.height/box)) * box 
    };
}

        ctx.fillRect(0, 0, canvas.width, canvas.height);
